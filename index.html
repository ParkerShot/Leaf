<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaf</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app" id="app">
  <nav class="rail">
    <div class="rail-head">
      <h2 data-i18n="folders">Папки</h2>
      <button class="icon-btn" id="newFolderBtn" data-i18n-title="newFolder" title="Новая папка">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      </button>
    </div>
    <div id="folderList"></div>
    <div class="rail-foot">
      <button class="lang-btn" id="langBtn" title="Язык / Language">RU</button>
      <button class="update-btn" id="updateBtn" title="Доступно обновление">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/></svg>
      </button>
    </div>
  </nav>

  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="title-row">
        <h1 id="folderTitle">Все заметки</h1>
        <div class="head-btns">
          <button class="icon-btn" id="newBtn" data-i18n-title="newNote" title="Новая заметка">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
        </div>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" data-i18n-ph="search" placeholder="Поиск">
      </div>
    </div>
    <div class="sort-row">
      <select id="sortSelect">
        <option value="updated">По дате изменения</option>
        <option value="created">По дате создания</option>
        <option value="title">По названию</option>
      </select>
    </div>
    <div class="note-list" id="noteList"></div>
  </aside>

  <main class="editor">
    <div class="toolbar" id="toolbar" style="display:none;">
      <select class="fmt-select" id="fmtSelect">
        <option value="div">Текст</option>
        <option value="h2">Заголовок</option>
        <option value="h3">Подзаголовок</option>
        <option value="pre">Моноширинный</option>
        <option value="blockquote">Цитата</option>
      </select>
      <span class="divider"></span>
      <button class="tool fmt" data-cmd="bold" data-i18n-title="bold" title="Жирный">B</button>
      <button class="tool fmt" data-cmd="italic" data-i18n-title="italic" title="Курсив" style="font-style:italic;font-weight:600">I</button>
      <button class="tool fmt" data-cmd="underline" data-i18n-title="underline" title="Подчёркнутый" style="text-decoration:underline;font-weight:600">U</button>
      <button class="tool fmt" data-cmd="strikeThrough" data-i18n-title="strike" title="Зачёркнутый" style="text-decoration:line-through;font-weight:600">S</button>
      <button class="tool" id="hlBtn" data-i18n-title="highlight" title="Выделить цветом">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11-6 6v3h3l6-6"/><path d="m17 3 4 4-9 9-4-4Z"/></svg>
      </button>
      <span class="divider"></span>
      <button class="tool" data-cmd="insertUnorderedList" data-i18n-title="bulleted" title="Маркированный список">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.3" fill="currentColor"/><circle cx="3.5" cy="12" r="1.3" fill="currentColor"/><circle cx="3.5" cy="18" r="1.3" fill="currentColor"/></svg>
      </button>
      <button class="tool" data-cmd="insertOrderedList" data-i18n-title="numbered" title="Нумерованный список">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
      </button>
      <button class="tool" id="checkBtn" data-i18n-title="checklist" title="Чек-лист">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>
      </button>
      <span class="divider"></span>
      <button class="tool" id="tableBtn" data-i18n-title="table" title="Таблица">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
      </button>
      <button class="tool" id="imgBtn" data-i18n-title="image" title="Картинка">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-4.5-4.5L5 21"/></svg>
      </button>
      <input type="file" id="imgInput" accept="image/*" style="display:none">
      <span class="spacer"></span>
      <button class="tool" id="moveBtn" data-i18n-title="move" title="Переместить в папку">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
      </button>
      <button class="tool" id="lockBtn" title="Заблокировать паролем">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </button>
      <button class="tool" id="pinBtn" title="Закрепить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
      </button>
      <button class="tool danger" id="delBtn" data-i18n-title="trash" title="В корзину">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
      <button class="tool" id="themeBtn" data-i18n-title="theme" title="Светлая / тёмная тема">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>

    <div class="trash-bar" id="trashBar">
      <span class="spacer"></span>
      <button class="pill restore" id="restoreBtn" data-i18n="restore">Восстановить</button>
      <button class="pill purge" id="purgeBtn" data-i18n="deleteForever">Удалить навсегда</button>
    </div>

    <div class="editor-scroll">
      <div class="no-selection" id="noSelection">
        <div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6"/><path d="M9 17h3"/></svg>
          <p data-i18n="selectNote">Выберите заметку или создайте новую</p>
        </div>
      </div>

      <div class="lock-screen" id="lockScreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <p data-i18n="lockedHeading">Эта заметка заблокирована</p>
        <input type="password" id="unlockInput" data-i18n-ph="enterPass" placeholder="Введите пароль">
        <button id="unlockBtn" data-i18n="openBtn">Открыть</button>
      </div>

      <div class="page" id="page" style="display:none;">
        <div class="edit-date" id="editDate"></div>
        <input class="edit-title" id="editTitle" data-i18n-ph="titlePh" placeholder="Заголовок" maxlength="120">
        <div class="edit-body" id="editBody" contenteditable="true" data-placeholder="Начните печатать…"></div>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
